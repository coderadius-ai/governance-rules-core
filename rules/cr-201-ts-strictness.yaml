id: cr-201-ts-strictness
name: TypeScript strict mode compliance
description: >
  Every TypeScript project must have tsconfig.json with strict mode enabled.
  Specifically: strict=true, noFallthroughCasesInSwitch=true,
  noUncheckedIndexedAccess=true.

  Uses resolvedStrict/resolvedNoFallthrough/resolvedNoUnchecked which account
  for tsconfig inheritance chains (extends).

  Covers both Repository-owned tsconfig files and Service-owned tsconfig files
  in monorepos where each app/package has its own configuration. This prevents
  false negatives where a repo-level tsconfig passes but a service-level one fails.
severity: error
scope: repository
failFast: false
tags:
  - code-quality
  - typescript

query: |
  // Find ALL repositories that have at least one TypeScript ToolConfig
  MATCH (tc:ToolConfig)
  WHERE tc.tool = 'TypeScript'
  
  // Path 1: ToolConfig is directly owned by a Repository
  OPTIONAL MATCH (r1:Repository)-[:HAS_TOOL_CONFIG]->(tc)
  
  // Path 2: ToolConfig is owned by a Service (monorepo per-app tsconfig)
  OPTIONAL MATCH (svc:Service)-[:HAS_TOOL_CONFIG]->(tc)
  OPTIONAL MATCH (svc)-[:STORED_IN]->(r2:Repository)
  
  WITH tc, coalesce(r1, r2) AS repo
  WHERE repo IS NOT NULL
  
  // Check compliance per tsconfig
  WITH repo, tc,
    CASE WHEN tc.resolvedStrict <> true
           OR tc.resolvedNoFallthroughCasesInSwitch <> true
           OR tc.resolvedNoUncheckedIndexedAccess <> true
         THEN true ELSE false END AS isNonCompliant
  
  // Aggregate per repository
  WITH repo,
    collect(CASE WHEN isNonCompliant THEN {
      file:        tc.name,
      strict:      tc.resolvedStrict,
      noFall:      tc.resolvedNoFallthroughCasesInSwitch,
      noUnchecked: tc.resolvedNoUncheckedIndexedAccess,
      source:      tc.strictSource
    } ELSE null END) AS rawViolations
  WITH repo, [v IN rawViolations WHERE v IS NOT NULL] AS violations
  
  RETURN
    repo.id         AS entityId,
    repo.name       AS entityName,
    'repository'    AS entityType,
    CASE WHEN size(violations) = 0 THEN 'pass' ELSE 'fail' END AS status,
    CASE WHEN size(violations) = 0 THEN ''
    ELSE 'tsconfig non-compliant: ' + reduce(a = '', v IN violations |
      a + v.file +
      CASE WHEN v.strict <> true THEN ' [strict=false]' ELSE '' END +
      CASE WHEN v.noFall <> true THEN ' [noFallthroughCasesInSwitch=false]' ELSE '' END +
      CASE WHEN v.noUnchecked <> true THEN ' [noUncheckedIndexedAccess=false]' ELSE '' END +
      CASE WHEN v.source = 'inherited' THEN ' (inherited)' ELSE '' END +
      '; '
    ) END AS detail
