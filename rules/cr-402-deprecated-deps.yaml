id: cr-402-deprecated-deps
name: Public API services must not use deprecated packages
description: >
  Services that expose public API endpoints (via APIInterface) must not depend
  on packages that have explicitly deprecated releases. Deprecated packages
  indicate abandonment, security risk, or planned removal.

  This is a topology-aware policy that exploits the CodeRadius graph structure:
  it cross-references PUBLIC SERVICE EXPOSURE (via APIEndpoint) with PACKAGE
  HEALTH (via Release.deprecated=true). This is impossible to express as a
  file-level lint rule.

  Why NOT "packages with a newer version available":
    The DEPENDS_ON relationship stores requiredVersion (e.g. ^18.0.0) as a
    semver range. Comparing this reliably against latestKnownVersion requires
    semver range resolution which Cypher cannot perform natively. Using only
    latestKnownVersion IS NOT NULL would flag every service using ANY external
    package that was ever published (false positive for all packages).
    Release.deprecated=true is definitive data — it means the publisher has
    explicitly marked that version as deprecated via the registry.

  Data populated by: package publisher plugin + git tag scanner.
severity: warning
scope: service
failFast: false
tags:
  - security
  - dependencies
  - topology

query: |
  // Find services that expose at least one HTTP API endpoint
  MATCH (s:Service)-[:EXPOSES_API]->(ai:APIInterface)-[:HAS_ENDPOINT]->(e:APIEndpoint)

  // Find external packages they depend on that have explicitly deprecated releases.
  // Release.deprecated=true means the publisher marked this version as abandoned/unsafe.
  // This is definitive data unlike latestKnownVersion which cannot be compared
  // to a semver range without runtime resolution.
  MATCH (s)-[dep:DEPENDS_ON]->(p:Package)-[:HAS_RELEASE]->(rel:Release)
  WHERE rel.deprecated = true
    AND p.isInternal = false

  // Collect all deprecated package@version pairs for the violation message
  WITH s, collect(DISTINCT p.name + '@' + rel.version) AS deprecatedDeps
  WHERE size(deprecatedDeps) > 0

  // Get the owning team for alert routing (optional — services may be unowned)
  OPTIONAL MATCH (t:Team)-[:OWNS]->(s)

  RETURN
    s.id      AS entityId,
    s.name    AS entityName,
    'service' AS entityType,
    'Public API service depends on ' + toString(size(deprecatedDeps)) +
    ' explicitly deprecated package(s): ' +
    reduce(a = '', d IN deprecatedDeps | a + d + ', ') AS detail
